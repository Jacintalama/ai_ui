<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrudTest — Item Manager</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    /* Critical inline styles */
    :root { color-scheme: light; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #0f172a; }

    /* Visible focus states */
    :focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; border-radius: 4px; }

    /* Compact row height */
    .row-compact td { height: 44px; }
    .row-comfortable td { height: 64px; }

    /* Drawer transition */
    #drawer { transition: transform 0.25s ease; transform: translateX(100%); }
    #drawer.open { transform: translateX(0); }
    #drawer-backdrop { transition: opacity 0.25s ease; }

    /* Toast */
    #toast-container { pointer-events: none; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* Checkbox accent */
    input[type="checkbox"] { accent-color: #3b82f6; }

    /* Sort arrow */
    .sort-asc::after  { content: ' ↑'; font-size: 0.7rem; }
    .sort-desc::after { content: ' ↓'; font-size: 0.7rem; }

    /* Inline validation */
    .field-error { color: #dc2626; font-size: 0.75rem; margin-top: 2px; }

    /* Status badge */
    .badge-active   { background: #dcfce7; color: #166534; }
    .badge-inactive { background: #f1f5f9; color: #475569; }
    .badge-pending  { background: #fef9c3; color: #854d0e; }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#3b82f6', dark: '#2563eb' }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex flex-col">

<!-- ── Top Bar ─────────────────────────────────────────────────── -->
<header class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-30">
  <div class="max-w-7xl mx-auto flex flex-wrap items-center gap-3">
    <h1 class="text-lg font-semibold text-slate-900 shrink-0">Item Manager</h1>

    <!-- Search -->
    <div class="relative flex-1 min-w-[180px] max-w-sm">
      <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true">
        <i data-lucide="search" class="w-4 h-4"></i>
      </span>
      <label for="search" class="sr-only">Search items</label>
      <input
        id="search" type="search" placeholder="Search items…"
        class="w-full pl-8 pr-3 py-1.5 text-sm border border-slate-300 rounded-md
               focus:border-brand focus:ring-1 focus:ring-brand bg-slate-50"
        autocomplete="off"
      />
    </div>

    <!-- Comfortable toggle -->
    <label class="flex items-center gap-1.5 text-sm text-slate-600 cursor-pointer select-none">
      <input type="checkbox" id="comfortable-toggle" class="rounded" />
      Comfortable
    </label>

    <!-- New button -->
    <button id="btn-new"
      class="ml-auto flex items-center gap-1.5 bg-brand text-white text-sm font-medium
             px-4 py-1.5 rounded-md hover:bg-brand-dark focus-visible:ring-2
             focus-visible:ring-brand focus-visible:ring-offset-1 transition-colors">
      <i data-lucide="plus" class="w-4 h-4" aria-hidden="true"></i>
      New Item
    </button>
  </div>
</header>

<!-- ── Filter chips ─────────────────────────────────────────────── -->
<div class="bg-white border-b border-slate-200 px-4 py-2">
  <div class="max-w-7xl mx-auto flex flex-wrap gap-2 items-center">
    <span class="text-xs text-slate-500 font-medium mr-1">Filter:</span>
    <button data-filter="all"
      class="filter-chip px-3 py-1 rounded-full text-xs font-medium border border-brand bg-brand text-white transition-colors">
      All
    </button>
    <button data-filter="active"
      class="filter-chip px-3 py-1 rounded-full text-xs font-medium border border-slate-300 text-slate-600 hover:border-brand hover:text-brand transition-colors">
      Active
    </button>
    <button data-filter="pending"
      class="filter-chip px-3 py-1 rounded-full text-xs font-medium border border-slate-300 text-slate-600 hover:border-brand hover:text-brand transition-colors">
      Pending
    </button>
    <button data-filter="inactive"
      class="filter-chip px-3 py-1 rounded-full text-xs font-medium border border-slate-300 text-slate-600 hover:border-brand hover:text-brand transition-colors">
      Inactive
    </button>

    <!-- Bulk actions (hidden until selection) -->
    <span id="bulk-bar" class="hidden ml-auto flex items-center gap-2">
      <span id="bulk-count" class="text-xs text-slate-600"></span>
      <button id="btn-bulk-delete"
        class="flex items-center gap-1 text-xs text-red-600 border border-red-200 px-2 py-1 rounded hover:bg-red-50 transition-colors">
        <i data-lucide="trash-2" class="w-3 h-3" aria-hidden="true"></i>
        Delete selected
      </button>
    </span>
  </div>
</div>

<!-- ── Main content ─────────────────────────────────────────────── -->
<main class="flex-1 px-4 py-4">
  <div class="max-w-7xl mx-auto">

    <!-- Loading skeleton -->
    <div id="loading" class="flex justify-center py-16">
      <span class="animate-spin text-slate-400"><i data-lucide="loader-2" class="w-7 h-7"></i></span>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden flex flex-col items-center py-20 text-center">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none" aria-hidden="true"
           class="mb-6 opacity-40">
        <rect x="10" y="30" width="100" height="72" rx="8" fill="#cbd5e1"/>
        <rect x="22" y="18" width="76" height="72" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
        <line x1="36" y1="42" x2="84" y2="42" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
        <line x1="36" y1="54" x2="70" y2="54" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
        <line x1="36" y1="66" x2="78" y2="66" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p class="text-slate-500 text-sm mb-4" id="empty-msg">No items yet.</p>
      <button id="btn-empty-new"
        class="flex items-center gap-2 bg-brand text-white text-sm font-medium px-5 py-2 rounded-md
               hover:bg-brand-dark transition-colors">
        <i data-lucide="plus" class="w-4 h-4" aria-hidden="true"></i>
        Add your first item
      </button>
    </div>

    <!-- Table -->
    <div id="table-wrapper" class="hidden overflow-x-auto rounded-lg border border-slate-200 bg-white">
      <table class="w-full text-sm" role="grid" aria-label="Items">
        <thead>
          <tr class="border-b border-slate-200 bg-slate-50 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">
            <th class="w-10 px-3 py-3">
              <label class="sr-only" for="select-all">Select all</label>
              <input type="checkbox" id="select-all" class="rounded" />
            </th>
            <th class="px-3 py-3 cursor-pointer hover:text-slate-800 select-none" data-sort="name">Name</th>
            <th class="px-3 py-3 cursor-pointer hover:text-slate-800 select-none hidden sm:table-cell" data-sort="status">Status</th>
            <th class="px-3 py-3 cursor-pointer hover:text-slate-800 select-none hidden md:table-cell" data-sort="created_at">Created</th>
            <th class="px-3 py-3 hidden lg:table-cell">Description</th>
            <th class="px-3 py-3 w-20 text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="table-body" class="divide-y divide-slate-100">
        </tbody>
      </table>
    </div>

    <!-- Row count -->
    <p id="row-count" class="mt-3 text-xs text-slate-400 hidden"></p>
  </div>
</main>

<!-- ── Side Drawer ──────────────────────────────────────────────── -->
<div id="drawer-backdrop"
     class="fixed inset-0 bg-slate-900/30 z-40 hidden opacity-0"
     aria-hidden="true">
</div>

<aside id="drawer"
       role="dialog" aria-modal="true" aria-label="Item details"
       class="fixed top-0 right-0 h-full w-full sm:w-[640px] bg-white z-50 flex flex-col shadow-xl">

  <!-- Drawer header -->
  <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
    <h2 id="drawer-title" class="text-base font-semibold text-slate-900">New Item</h2>
    <button id="btn-drawer-close" aria-label="Close drawer"
      class="text-slate-400 hover:text-slate-700 transition-colors">
      <i data-lucide="x" class="w-5 h-5" aria-hidden="true"></i>
    </button>
  </div>

  <!-- Drawer body -->
  <form id="item-form" novalidate class="flex-1 overflow-y-auto px-6 py-5 space-y-5">
    <input type="hidden" id="form-id" />

    <!-- Name -->
    <div>
      <label for="form-name" class="block text-sm font-medium text-slate-700 mb-1">
        Name <span class="text-red-500" aria-hidden="true">*</span>
      </label>
      <input id="form-name" type="text" required maxlength="120"
        class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm
               focus:border-brand focus:ring-1 focus:ring-brand"
        placeholder="Enter item name" />
      <p class="field-error hidden" id="err-name">Name is required.</p>
    </div>

    <!-- Status -->
    <div>
      <label for="form-status" class="block text-sm font-medium text-slate-700 mb-1">
        Status <span class="text-red-500" aria-hidden="true">*</span>
      </label>
      <select id="form-status"
        class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm
               focus:border-brand focus:ring-1 focus:ring-brand bg-white">
        <option value="active">Active</option>
        <option value="pending">Pending</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>

    <!-- Description -->
    <div>
      <label for="form-description" class="block text-sm font-medium text-slate-700 mb-1">
        Description
      </label>
      <textarea id="form-description" rows="4" maxlength="1000"
        class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm
               focus:border-brand focus:ring-1 focus:ring-brand resize-none"
        placeholder="Optional — describe this item"></textarea>
    </div>

    <!-- Meta (shown in edit mode) -->
    <div id="form-meta" class="hidden text-xs text-slate-400 space-y-1 pt-2 border-t border-slate-100">
      <p>Created: <span id="meta-created">—</span></p>
      <p>Updated: <span id="meta-updated">—</span></p>
    </div>
  </form>

  <!-- Drawer footer -->
  <div class="px-6 py-4 border-t border-slate-200 flex items-center justify-between gap-3">
    <button id="btn-drawer-delete" type="button"
      class="hidden text-red-600 text-sm hover:underline flex items-center gap-1">
      <i data-lucide="trash-2" class="w-4 h-4" aria-hidden="true"></i>
      Delete
    </button>
    <div class="flex gap-3 ml-auto">
      <button type="button" id="btn-drawer-cancel"
        class="px-4 py-2 text-sm border border-slate-300 rounded-md text-slate-700
               hover:bg-slate-50 transition-colors">
        Cancel
      </button>
      <button type="button" id="btn-drawer-save"
        class="px-5 py-2 text-sm bg-brand text-white font-medium rounded-md
               hover:bg-brand-dark transition-colors flex items-center gap-1.5">
        <i data-lucide="save" class="w-4 h-4" aria-hidden="true"></i>
        Save
      </button>
    </div>
  </div>
</aside>

<!-- ── Delete Confirm Modal ─────────────────────────────────────── -->
<div id="confirm-modal"
     role="dialog" aria-modal="true" aria-labelledby="confirm-title"
     class="hidden fixed inset-0 z-[60] flex items-center justify-center px-4">
  <div class="absolute inset-0 bg-slate-900/40" id="confirm-backdrop"></div>
  <div class="relative bg-white rounded-xl border border-slate-200 p-6 w-full max-w-md shadow-lg">
    <h3 id="confirm-title" class="text-base font-semibold text-slate-900 mb-2">Delete item?</h3>
    <p id="confirm-body" class="text-sm text-slate-600 mb-6">
      This action cannot be undone.
    </p>
    <div class="flex gap-3 justify-end">
      <button id="confirm-cancel"
        class="px-4 py-2 text-sm border border-slate-300 rounded-md text-slate-700 hover:bg-slate-50 transition-colors">
        Cancel
      </button>
      <button id="confirm-ok"
        class="px-4 py-2 text-sm bg-red-600 text-white font-medium rounded-md hover:bg-red-700 transition-colors">
        Delete
      </button>
    </div>
  </div>
</div>

<!-- ── Toast container ─────────────────────────────────────────── -->
<div id="toast-container"
     aria-live="polite" aria-atomic="false"
     class="fixed bottom-4 right-4 z-[70] flex flex-col gap-2 max-w-sm">
</div>

<!-- ── Footer ──────────────────────────────────────────────────── -->
<footer class="text-center text-xs text-slate-400 py-3 border-t border-slate-100">
  CrudTest &mdash; <span id="storage-label">loading…</span>
</footer>

<!-- ═══════════════════════════════════════════════════════════════
     Application Logic
═══════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── Storage abstraction ───────────────────────────────────────────
const LS_KEY = 'crudtest_v1';

const storage = (() => {
  const supabaseUrl = window.SUPABASE_URL;
  const supabaseKey = window.SUPABASE_ANON_KEY;
  const hasSupabase = supabaseUrl && supabaseKey;

  if (hasSupabase) {
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);
    document.getElementById('storage-label').textContent = 'Powered by Supabase';
    return {
      type: 'supabase',
      client,
      async list() {
        const { data, error } = await client.from('items').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        return data;
      },
      async create(item) {
        const { data, error } = await client.from('items').insert(item).select().single();
        if (error) throw error;
        return data;
      },
      async update(id, item) {
        const { data, error } = await client.from('items').update(item).eq('id', id).select().single();
        if (error) throw error;
        return data;
      },
      async remove(id) {
        const { error } = await client.from('items').delete().eq('id', id);
        if (error) throw error;
      },
      async removeMany(ids) {
        const { error } = await client.from('items').delete().in('id', ids);
        if (error) throw error;
      }
    };
  }

  // LocalStorage fallback
  document.getElementById('storage-label').textContent = 'Data saved in browser (localStorage)';
  function load() { try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch { return []; } }
  function save(items) { localStorage.setItem(LS_KEY, JSON.stringify(items)); }
  function uuid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }
  return {
    type: 'local',
    async list() { return load(); },
    async create(item) {
      const items = load();
      const now = new Date().toISOString();
      const newItem = { ...item, id: uuid(), user_id: 'local', created_at: now, updated_at: now };
      save([newItem, ...items]);
      return newItem;
    },
    async update(id, patch) {
      const items = load();
      const idx = items.findIndex(i => i.id === id);
      if (idx === -1) throw new Error('Not found');
      const updated = { ...items[idx], ...patch, updated_at: new Date().toISOString() };
      items[idx] = updated;
      save(items);
      return updated;
    },
    async remove(id) {
      save(load().filter(i => i.id !== id));
    },
    async removeMany(ids) {
      save(load().filter(i => !ids.includes(i.id)));
    }
  };
})();

// ── State ─────────────────────────────────────────────────────────
let items = [];
let filter = 'all';
let searchQ = '';
let sortKey = 'created_at';
let sortDir = 'desc';
let comfortable = false;
let selected = new Set();
let drawerMode = null; // 'new' | 'edit'
let drawerItem = null;
let pendingDeleteIds = [];

// ── DOM refs ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const loading      = $('loading');
const emptyState   = $('empty-state');
const emptyMsg     = $('empty-msg');
const tableWrapper = $('table-wrapper');
const tableBody    = $('table-body');
const rowCount     = $('row-count');
const searchEl     = $('search');
const bulkBar      = $('bulk-bar');
const bulkCount    = $('bulk-count');
const drawer       = $('drawer');
const drawerBg     = $('drawer-backdrop');
const drawerTitle  = $('drawer-title');
const drawerDel    = $('btn-drawer-delete');
const formId       = $('form-id');
const formName     = $('form-name');
const formStatus   = $('form-status');
const formDesc     = $('form-description');
const formMeta     = $('form-meta');
const metaCreated  = $('meta-created');
const metaUpdated  = $('meta-updated');
const errName      = $('err-name');
const confirmModal = $('confirm-modal');
const confirmBody  = $('confirm-body');
const confirmOk    = $('confirm-ok');

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  const colors = { info: 'bg-slate-800 text-white', success: 'bg-green-700 text-white', error: 'bg-red-700 text-white' };
  el.className = `pointer-events-auto px-4 py-3 rounded-lg shadow-lg text-sm ${colors[type]} flex items-center gap-2 max-w-sm`;
  el.textContent = msg;
  el.setAttribute('role', 'status');
  $('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── Filtered + sorted view ────────────────────────────────────────
function visibleItems() {
  let list = [...items];
  if (filter !== 'all') list = list.filter(i => i.status === filter);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(i =>
      i.name.toLowerCase().includes(q) ||
      (i.description || '').toLowerCase().includes(q)
    );
  }
  list.sort((a, b) => {
    let va = a[sortKey] ?? '', vb = b[sortKey] ?? '';
    if (typeof va === 'string') va = va.toLowerCase(), vb = vb.toLowerCase();
    if (va < vb) return sortDir === 'asc' ? -1 :  1;
    if (va > vb) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });
  return list;
}

// ── Render table ──────────────────────────────────────────────────
function renderTable() {
  const list = visibleItems();
  const rowClass = comfortable ? 'row-comfortable' : 'row-compact';

  // Update sort headers
  document.querySelectorAll('[data-sort]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc', 'text-slate-800');
    if (th.dataset.sort === sortKey) {
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc', 'text-slate-800');
    }
  });

  if (list.length === 0) {
    tableWrapper.classList.add('hidden');
    rowCount.classList.add('hidden');
    emptyState.classList.remove('hidden');
    emptyMsg.textContent = searchQ || filter !== 'all'
      ? 'No items match your search or filter.'
      : 'No items yet.';
    $('btn-empty-new').style.display = (searchQ || filter !== 'all') ? 'none' : '';
    loading.classList.add('hidden');
    return;
  }

  emptyState.classList.add('hidden');
  tableWrapper.classList.remove('hidden');
  loading.classList.add('hidden');
  rowCount.classList.remove('hidden');
  rowCount.textContent = `${list.length} item${list.length !== 1 ? 's' : ''}`;

  tableBody.innerHTML = '';
  list.forEach(item => {
    const tr = document.createElement('tr');
    tr.className = `${rowClass} hover:bg-slate-50 cursor-pointer transition-colors`;
    tr.dataset.id = item.id;
    const checked = selected.has(item.id);
    const statusBadge = { active: 'badge-active', inactive: 'badge-inactive', pending: 'badge-pending' }[item.status] || 'badge-inactive';
    const created = item.created_at ? new Date(item.created_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' }) : '—';
    const desc = (item.description || '').slice(0, 80) + ((item.description || '').length > 80 ? '…' : '');

    tr.innerHTML = `
      <td class="px-3" onclick="event.stopPropagation()">
        <input type="checkbox" class="row-check rounded" data-id="${item.id}" ${checked ? 'checked' : ''} aria-label="Select ${escHtml(item.name)}" />
      </td>
      <td class="px-3 font-medium text-slate-900">${escHtml(item.name)}</td>
      <td class="px-3 hidden sm:table-cell">
        <span class="px-2 py-0.5 rounded-full text-xs font-medium ${statusBadge}">${item.status}</span>
      </td>
      <td class="px-3 text-slate-500 hidden md:table-cell">${created}</td>
      <td class="px-3 text-slate-500 hidden lg:table-cell text-xs">${escHtml(desc)}</td>
      <td class="px-3 text-center" onclick="event.stopPropagation()">
        <div class="flex items-center justify-center gap-2">
          <button class="text-slate-400 hover:text-brand transition-colors" aria-label="Edit ${escHtml(item.name)}"
            onclick="openEditDrawer('${item.id}')">
            <i data-lucide="pencil" class="w-4 h-4" aria-hidden="true"></i>
          </button>
          <button class="text-slate-400 hover:text-red-600 transition-colors" aria-label="Delete ${escHtml(item.name)}"
            onclick="confirmDelete(['${item.id}'],'${escHtml(item.name)}')">
            <i data-lucide="trash-2" class="w-4 h-4" aria-hidden="true"></i>
          </button>
        </div>
      </td>
    `;
    tr.addEventListener('click', () => openEditDrawer(item.id));
    tableBody.appendChild(tr);
  });

  // Re-init lucide icons
  lucide.createIcons();
  updateBulkBar();
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Load from storage ─────────────────────────────────────────────
async function loadItems() {
  loading.classList.remove('hidden');
  emptyState.classList.add('hidden');
  tableWrapper.classList.add('hidden');
  try {
    items = await storage.list();
  } catch (e) {
    toast('Failed to load items: ' + (e.message || e), 'error');
    items = [];
  }
  renderTable();
}

// ── Drawer helpers ────────────────────────────────────────────────
function openDrawer() {
  drawerBg.classList.remove('hidden');
  requestAnimationFrame(() => { drawerBg.style.opacity = '1'; drawer.classList.add('open'); });
  document.addEventListener('keydown', onDrawerKey);
}

function closeDrawer() {
  drawerBg.style.opacity = '0';
  drawer.classList.remove('open');
  setTimeout(() => drawerBg.classList.add('hidden'), 250);
  document.removeEventListener('keydown', onDrawerKey);
  clearFormErrors();
}

function onDrawerKey(e) { if (e.key === 'Escape') closeDrawer(); }

function clearFormErrors() {
  errName.classList.add('hidden');
  formName.classList.remove('border-red-500');
}

function openNewDrawer() {
  drawerMode = 'new';
  drawerItem = null;
  drawerTitle.textContent = 'New Item';
  formId.value = '';
  formName.value = '';
  formStatus.value = 'active';
  formDesc.value = '';
  formMeta.classList.add('hidden');
  drawerDel.classList.add('hidden');
  clearFormErrors();
  openDrawer();
  formName.focus();
}

function openEditDrawer(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  drawerMode = 'edit';
  drawerItem = item;
  drawerTitle.textContent = 'Edit Item';
  formId.value = item.id;
  formName.value = item.name;
  formStatus.value = item.status;
  formDesc.value = item.description || '';
  formMeta.classList.remove('hidden');
  metaCreated.textContent = item.created_at ? new Date(item.created_at).toLocaleString() : '—';
  metaUpdated.textContent = item.updated_at ? new Date(item.updated_at).toLocaleString() : '—';
  drawerDel.classList.remove('hidden');
  clearFormErrors();
  openDrawer();
  formName.focus();
}

// ── Inline validation ─────────────────────────────────────────────
function validateForm() {
  let ok = true;
  if (!formName.value.trim()) {
    errName.classList.remove('hidden');
    formName.classList.add('border-red-500');
    formName.focus();
    ok = false;
  }
  return ok;
}

formName.addEventListener('input', () => {
  if (formName.value.trim()) {
    errName.classList.add('hidden');
    formName.classList.remove('border-red-500');
  }
});

// ── Save ──────────────────────────────────────────────────────────
async function saveItem() {
  if (!validateForm()) return;

  const payload = {
    name: formName.value.trim(),
    status: formStatus.value,
    description: formDesc.value.trim() || null,
  };

  if (drawerMode === 'new') {
    // Optimistic add
    const tempId = '__temp__' + Date.now();
    const optimistic = { ...payload, id: tempId, created_at: new Date().toISOString(), updated_at: new Date().toISOString() };
    items.unshift(optimistic);
    renderTable();
    closeDrawer();
    try {
      const saved = await storage.create(payload);
      items[items.findIndex(i => i.id === tempId)] = saved;
      renderTable();
      toast('Item created.', 'success');
    } catch (e) {
      items = items.filter(i => i.id !== tempId);
      renderTable();
      toast('Failed to create item: ' + (e.message || e), 'error');
    }
  } else {
    // Optimistic update
    const prevItem = { ...drawerItem };
    const idx = items.findIndex(i => i.id === drawerItem.id);
    items[idx] = { ...drawerItem, ...payload, updated_at: new Date().toISOString() };
    renderTable();
    closeDrawer();
    try {
      const saved = await storage.update(drawerItem.id, payload);
      items[idx] = saved;
      renderTable();
      toast('Item updated.', 'success');
    } catch (e) {
      items[idx] = prevItem;
      renderTable();
      toast('Failed to update item: ' + (e.message || e), 'error');
    }
  }
}

// ── Delete ────────────────────────────────────────────────────────
function confirmDelete(ids, label) {
  pendingDeleteIds = ids;
  const isBulk = ids.length > 1;
  confirmBody.textContent = isBulk
    ? `Permanently delete ${ids.length} selected items? This cannot be undone.`
    : `Permanently delete "${label}"? This cannot be undone.`;
  confirmModal.classList.remove('hidden');
}

async function executeDelete() {
  const ids = pendingDeleteIds;
  confirmModal.classList.add('hidden');

  // Optimistic remove
  const removed = items.filter(i => ids.includes(i.id));
  items = items.filter(i => !ids.includes(i.id));
  selected = new Set([...selected].filter(id => !ids.includes(id)));
  closeDrawer();
  renderTable();

  try {
    if (ids.length === 1) await storage.remove(ids[0]);
    else await storage.removeMany(ids);
    toast(`${ids.length} item${ids.length > 1 ? 's' : ''} deleted.`, 'success');
  } catch (e) {
    items = [...removed, ...items];
    renderTable();
    toast('Delete failed: ' + (e.message || e), 'error');
  }
}

// ── Bulk selection ────────────────────────────────────────────────
function updateBulkBar() {
  const count = selected.size;
  if (count > 0) {
    bulkBar.classList.remove('hidden');
    bulkBar.style.display = 'flex';
    bulkCount.textContent = `${count} selected`;
  } else {
    bulkBar.classList.add('hidden');
  }
  const all = document.getElementById('select-all');
  if (all) {
    const visible = visibleItems();
    all.checked = visible.length > 0 && visible.every(i => selected.has(i.id));
    all.indeterminate = !all.checked && visible.some(i => selected.has(i.id));
  }
}

tableBody.addEventListener('change', e => {
  if (e.target.classList.contains('row-check')) {
    const id = e.target.dataset.id;
    e.target.checked ? selected.add(id) : selected.delete(id);
    updateBulkBar();
  }
});

document.getElementById('select-all').addEventListener('change', e => {
  visibleItems().forEach(i => e.target.checked ? selected.add(i.id) : selected.delete(i.id));
  renderTable();
});

$('btn-bulk-delete').addEventListener('click', () => {
  if (selected.size === 0) return;
  confirmDelete([...selected]);
});

// ── Sort ──────────────────────────────────────────────────────────
document.querySelectorAll('[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortKey = key; sortDir = 'asc'; }
    renderTable();
  });
});

// ── Filter chips ──────────────────────────────────────────────────
document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-chip').forEach(b => {
      const active = b.dataset.filter === filter;
      b.classList.toggle('bg-brand', active);
      b.classList.toggle('text-white', active);
      b.classList.toggle('border-brand', active);
      b.classList.toggle('border-slate-300', !active);
      b.classList.toggle('text-slate-600', !active);
    });
    selected.clear();
    renderTable();
  });
});

// ── Search ────────────────────────────────────────────────────────
let searchTimer;
searchEl.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQ = searchEl.value.trim(); renderTable(); }, 200);
});

// ── Comfortable toggle ────────────────────────────────────────────
$('comfortable-toggle').addEventListener('change', e => {
  comfortable = e.target.checked;
  renderTable();
});

// ── Button wiring ─────────────────────────────────────────────────
$('btn-new').addEventListener('click', openNewDrawer);
$('btn-empty-new').addEventListener('click', openNewDrawer);
$('btn-drawer-close').addEventListener('click', closeDrawer);
$('btn-drawer-cancel').addEventListener('click', closeDrawer);
$('btn-drawer-save').addEventListener('click', saveItem);
$('btn-drawer-delete').addEventListener('click', () => {
  if (drawerItem) confirmDelete([drawerItem.id], drawerItem.name);
});
drawerBg.addEventListener('click', closeDrawer);
$('confirm-cancel').addEventListener('click', () => confirmModal.classList.add('hidden'));
$('confirm-backdrop').addEventListener('click', () => confirmModal.classList.add('hidden'));
confirmOk.addEventListener('click', executeDelete);

// ── Expose for inline onclick ─────────────────────────────────────
window.openEditDrawer = openEditDrawer;
window.confirmDelete  = confirmDelete;

// ── Boot ──────────────────────────────────────────────────────────
loadItems().then(() => lucide.createIcons());
</script>
</body>
</html>

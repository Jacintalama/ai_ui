<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3250;
      --text: #e2e4f0;
      --text-muted: #6b7280;
      --accent: #6366f1;
      --accent-hover: #4f52d4;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --done-opacity: 0.45;
      --overdue: #f97316;
      --future: #6366f1;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    #error-banner, #error-banner-auth {
      display: none;
      background: #450a0a;
      color: #fca5a5;
      border: 1px solid #7f1d1d;
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .container { max-width: 640px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    /* ---- Add task form ---- */
    #add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 2rem;
    }

    #add-form .form-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: flex-start;
    }

    #add-form .form-row:last-child { margin-bottom: 0; }

    input[type="text"], input[type="date"], textarea, input[type="text"].edit-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.5rem 0.7rem;
      outline: none;
      width: 100%;
    }

    input[type="text"]:focus, input[type="date"]:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 60px; font-family: inherit; }

    input[type="date"] { color-scheme: dark; }

    .form-secondary {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .form-secondary input[type="text"] { flex: 1; min-width: 140px; }
    .form-secondary input[type="date"] { flex: 0 0 150px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 0.3rem 0.6rem;
    }
    .btn-ghost:hover { color: var(--text); background: var(--surface2); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      padding: 0.3rem 0.6rem;
    }
    .btn-danger:hover { color: #fff; background: var(--danger-hover); }

    .field-error {
      color: #fca5a5;
      font-size: 0.82rem;
      margin-top: 0.25rem;
      display: none;
    }

    /* ---- Sections ---- */
    .section-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    #done-section { margin-top: 1.5rem; }

    .empty-state {
      color: var(--text-muted);
      font-size: 0.92rem;
      padding: 0.8rem 0;
    }

    /* ---- Task item ---- */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.7rem 0.8rem;
      margin-bottom: 0.4rem;
      transition: opacity 0.2s;
    }

    .task-item.task-done {
      opacity: var(--done-opacity);
    }

    .task-item input[type="checkbox"] {
      margin-top: 3px;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .task-body {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      font-weight: 500;
      word-break: break-word;
    }

    .task-item.task-done .task-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .due-badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      margin-top: 0.3rem;
      background: rgba(99,102,241,0.15);
      color: var(--future);
      border: 1px solid rgba(99,102,241,0.3);
    }

    .due-badge.overdue {
      background: rgba(249,115,22,0.15);
      color: var(--overdue);
      border-color: rgba(249,115,22,0.3);
    }

    .task-actions {
      display: flex;
      gap: 0.1rem;
      flex-shrink: 0;
      margin-top: -2px;
    }

    /* ---- Edit modal ---- */
    #edit-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #edit-overlay.open { display: flex; }

    #edit-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
    }

    #edit-modal h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.78rem;
    }

    .edit-field { margin-bottom: 0.8rem; }
    .edit-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; display: block; }

    .edit-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
    }
    .btn-secondary:hover { background: var(--border); }

    /* ---- Loading ---- */
    #loading {
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 1rem 0;
    }

    /* ---- Auth ---- */
    #auth-section {
      max-width: 360px;
      margin: 4rem auto 0;
    }

    #auth-section h1 {
      text-align: center;
      margin-bottom: 2rem;
    }

    #auth-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    #auth-form .field { margin-bottom: 1rem; }

    #auth-form label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    input[type="email"], input[type="password"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.5rem 0.7rem;
      outline: none;
      width: 100%;
    }

    input[type="email"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
    }

    #auth-form .btn-primary { width: 100%; margin-top: 0.5rem; padding: 0.65rem; }

    #auth-toggle {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    #auth-toggle a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
    }

    #app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    #app-header h1 { margin-bottom: 0; }

    #signout-btn {
      font-size: 0.82rem;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
    }

    #signout-btn:hover { color: var(--text); border-color: var(--text-muted); }
  </style>
</head>
<body>
<!-- Auth section (shown when logged out) -->
<div id="auth-section" style="display:none">
  <h1>Tasks</h1>
  <div id="error-banner-auth"></div>
  <div id="auth-form">
    <div class="field">
      <label for="auth-email">Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="auth-password">Password</label>
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
    </div>
    <button id="auth-submit" class="btn-primary">Sign in</button>
  </div>
  <div id="auth-toggle">
    <span id="auth-toggle-text">No account?</span>
    <a id="auth-toggle-link">Sign up</a>
  </div>
</div>

<!-- App section (shown when logged in) -->
<div class="container" id="app-section" style="display:none">
  <div id="error-banner"></div>

  <div id="app-header">
    <h1>Tasks</h1>
    <button id="signout-btn">Sign out</button>
  </div>

  <!-- Add form -->
  <form id="add-form" autocomplete="off">
    <div class="form-row">
      <input type="text" id="new-title" placeholder="New task…" />
      <button type="submit" class="btn-primary">Add</button>
    </div>
    <div class="field-error" id="title-error">Title is required.</div>
    <div class="form-secondary">
      <input type="text" id="new-desc" placeholder="Description (optional)" />
      <input type="date" id="new-due" title="Due date (optional)" />
    </div>
  </form>

  <!-- Task lists -->
  <div id="loading">Loading…</div>
  <section id="open-section" style="display:none">
    <div class="section-label">Open</div>
    <div id="open-tasks"></div>
  </section>
  <section id="done-section" style="display:none">
    <div class="section-label">Completed</div>
    <div id="done-tasks"></div>
  </section>

  <!-- Edit modal -->
  <div id="edit-overlay">
    <div id="edit-modal">
      <h2>Edit Task</h2>
      <div class="edit-field">
        <label class="edit-label" for="edit-title">Title</label>
        <input type="text" id="edit-title" />
      </div>
      <div class="edit-field">
        <label class="edit-label" for="edit-desc">Description</label>
        <textarea id="edit-desc" rows="3"></textarea>
      </div>
      <div class="edit-field">
        <label class="edit-label" for="edit-due">Due Date</label>
        <input type="date" id="edit-due" />
      </div>
      <div class="edit-actions">
        <button type="button" class="btn-secondary" id="edit-cancel">Cancel</button>
        <button type="button" class="btn-primary" id="edit-save">Save</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ---- Config ----------------------------------------------------------------
const SUPABASE_URL = window.SUPABASE_URL || window.ENV?.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || window.ENV?.SUPABASE_ANON_KEY;

const errorBanner = document.getElementById('error-banner');
const errorBannerAuth = document.getElementById('error-banner-auth');
const authSection = document.getElementById('auth-section');
const appSection = document.getElementById('app-section');

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = 'block';
}

function showAuthError(msg) {
  errorBannerAuth.textContent = msg;
  errorBannerAuth.style.display = 'block';
}

if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
  authSection.style.display = 'block';
  showAuthError('Supabase is not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY in the environment.');
}

const db = (SUPABASE_URL && SUPABASE_ANON_KEY)
  ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

// ---- Auth UI ---------------------------------------------------------------
let authMode = 'signin'; // 'signin' | 'signup'

const authSubmit = document.getElementById('auth-submit');
const authToggleLink = document.getElementById('auth-toggle-link');
const authToggleText = document.getElementById('auth-toggle-text');

authToggleLink?.addEventListener('click', () => {
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  authSubmit.textContent = authMode === 'signin' ? 'Sign in' : 'Sign up';
  authToggleText.textContent = authMode === 'signin' ? 'No account?' : 'Already have an account?';
  authToggleLink.textContent = authMode === 'signin' ? 'Sign up' : 'Sign in';
  errorBannerAuth.style.display = 'none';
});

authSubmit?.addEventListener('click', async () => {
  if (!db) return;
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!email || !password) { showAuthError('Email and password are required.'); return; }
  errorBannerAuth.style.display = 'none';
  authSubmit.disabled = true;

  const { error } = authMode === 'signin'
    ? await db.auth.signInWithPassword({ email, password })
    : await db.auth.signUp({ email, password });

  authSubmit.disabled = false;
  if (error) { showAuthError(error.message); return; }
  if (authMode === 'signup') {
    showAuthError('Check your email to confirm your account, then sign in.');
    return;
  }
});

document.getElementById('signout-btn')?.addEventListener('click', async () => {
  await db?.auth.signOut();
});

// ---- Auth state listener ---------------------------------------------------
function showApp(session) {
  if (session) {
    authSection.style.display = 'none';
    appSection.style.display = 'block';
    loadTasks();
  } else {
    authSection.style.display = 'block';
    appSection.style.display = 'none';
  }
}

if (db) {
  db.auth.onAuthStateChange((_event, session) => showApp(session));
  db.auth.getSession().then(({ data }) => showApp(data.session));
}

// ---- State -----------------------------------------------------------------
let tasks = [];
let editingId = null;

// ---- DOM refs --------------------------------------------------------------
const loading = document.getElementById('loading');
const openSection = document.getElementById('open-section');
const doneSection = document.getElementById('done-section');
const openList = document.getElementById('open-tasks');
const doneList = document.getElementById('done-tasks');
const addForm = document.getElementById('add-form');
const newTitle = document.getElementById('new-title');
const newDesc = document.getElementById('new-desc');
const newDue = document.getElementById('new-due');
const titleError = document.getElementById('title-error');
const editOverlay = document.getElementById('edit-overlay');
const editTitle = document.getElementById('edit-title');
const editDesc = document.getElementById('edit-desc');
const editDue = document.getElementById('edit-due');

// ---- Load ------------------------------------------------------------------
export async function loadTasks() {
  if (!db) return;
  const { data, error } = await db.from('tasks').select('*').order('done', { ascending: true }).order('created_at', { ascending: true });
  if (error) { showError('Failed to load tasks: ' + error.message); return; }
  tasks = data || [];
  renderTasks();
}

// ---- Render ----------------------------------------------------------------
function renderTasks() {
  loading.style.display = 'none';

  const today = new Date().toISOString().slice(0, 10);
  const open = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);

  openSection.style.display = 'block';
  openList.innerHTML = open.length
    ? open.map(t => taskItemHTML(t, today)).join('')
    : '<p class="empty-state">No tasks yet</p>';

  if (done.length) {
    doneSection.style.display = 'block';
    doneList.innerHTML = done.map(t => taskItemHTML(t, today)).join('');
  } else {
    doneSection.style.display = 'none';
    doneList.innerHTML = '';
  }
}

function taskItemHTML(t, today) {
  const overdue = t.due_date && t.due_date < today && !t.done;
  const dueBadge = t.due_date
    ? `<span class="due-badge${overdue ? ' overdue' : ''}">${t.due_date}</span>`
    : '';
  const desc = t.description
    ? `<div class="task-desc">${escapeHTML(t.description)}</div>`
    : '';
  return `<div class="task-item${t.done ? ' task-done' : ''}" data-id="${t.id}">
    <input type="checkbox"${t.done ? ' checked' : ''} data-action="toggle" />
    <div class="task-body">
      <div class="task-title">${escapeHTML(t.title)}</div>
      ${desc}
      ${dueBadge}
    </div>
    <div class="task-actions">
      <button class="btn-ghost" data-action="edit" title="Edit">✎</button>
      <button class="btn-danger" data-action="delete" title="Delete">✕</button>
    </div>
  </div>`;
}

function escapeHTML(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Delegate events -------------------------------------------------------
function getTaskId(el) {
  return el.closest('.task-item')?.dataset.id;
}

document.addEventListener('change', async (e) => {
  if (e.target.dataset.action !== 'toggle') return;
  const id = getTaskId(e.target);
  if (!id) return;
  const done = e.target.checked;
  const { error } = await db.from('tasks').update({ done }).eq('id', id);
  if (error) showError('Update failed: ' + error.message);
  else await loadTasks();
});

document.addEventListener('click', async (e) => {
  const action = e.target.dataset.action;
  if (!action) return;
  const id = getTaskId(e.target);
  if (!id) return;

  if (action === 'delete') {
    const { error } = await db.from('tasks').delete().eq('id', id);
    if (error) showError('Delete failed: ' + error.message);
    else await loadTasks();
  }

  if (action === 'edit') {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    editingId = id;
    editTitle.value = task.title;
    editDesc.value = task.description || '';
    editDue.value = task.due_date || '';
    editOverlay.classList.add('open');
    editTitle.focus();
  }
});

// ---- Add form --------------------------------------------------------------
addForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = newTitle.value.trim();
  if (!title) {
    titleError.style.display = 'block';
    newTitle.focus();
    return;
  }
  titleError.style.display = 'none';

  const row = {
    title,
    description: newDesc.value.trim() || null,
    due_date: newDue.value || null,
    done: false,
  };

  const { error } = await db.from('tasks').insert([row]);
  if (error) { showError('Insert failed: ' + error.message); return; }

  newTitle.value = '';
  newDesc.value = '';
  newDue.value = '';
  await loadTasks();
  newTitle.focus();
});

newTitle.addEventListener('input', () => {
  if (newTitle.value.trim()) titleError.style.display = 'none';
});

// ---- Edit modal ------------------------------------------------------------
document.getElementById('edit-cancel').addEventListener('click', () => {
  editOverlay.classList.remove('open');
  editingId = null;
});

editOverlay.addEventListener('click', (e) => {
  if (e.target === editOverlay) {
    editOverlay.classList.remove('open');
    editingId = null;
  }
});

document.getElementById('edit-save').addEventListener('click', async () => {
  const title = editTitle.value.trim();
  if (!title || !editingId) return;

  const patch = {
    title,
    description: editDesc.value.trim() || null,
    due_date: editDue.value || null,
  };

  const { error } = await db.from('tasks').update(patch).eq('id', editingId);
  if (error) { showError('Update failed: ' + error.message); return; }

  editOverlay.classList.remove('open');
  editingId = null;
  await loadTasks();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && editOverlay.classList.contains('open')) {
    editOverlay.classList.remove('open');
    editingId = null;
  }
});

// ---- Boot ------------------------------------------------------------------
// Auth state listener handles initial load above.
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <link rel="stylesheet" href="styles/main.css">
  <!-- Loads window.SUPABASE_URL / SUPABASE_ANON_KEY from the host. ALWAYS first. -->
  <script src="aiui-config.js"></script>
  <!-- Imports the SDK once, attaches to window. -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
    if (!window.supabase) {
      window.supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }
  </script>
</head>
<body>
<!-- Auth section (shown when logged out) -->
<div id="auth-section" style="display:none">
  <h1>Tasks</h1>
  <div id="error-banner-auth"></div>
  <div id="auth-form">
    <div class="field">
      <label for="auth-email">Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="auth-password">Password</label>
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
    </div>
    <button id="auth-submit" class="btn-primary">Sign in</button>
  </div>
  <div id="auth-toggle">
    <span id="auth-toggle-text">No account?</span>
    <a id="auth-toggle-link">Sign up</a>
  </div>
</div>

<!-- App section (shown when logged in) -->
<div class="container" id="app-section" style="display:none">
  <div id="error-banner"></div>

  <div id="app-header">
    <h1>Tasks</h1>
    <button id="signout-btn">Sign out</button>
  </div>

  <form id="add-form" autocomplete="off">
    <div class="form-row">
      <input type="text" id="new-title" placeholder="New task..." />
      <button type="submit" class="btn-primary">Add</button>
    </div>
    <div class="field-error" id="title-error">Title is required.</div>
    <div class="form-secondary">
      <input type="text" id="new-desc" placeholder="Description (optional)" />
      <input type="date" id="new-due" title="Due date (optional)" />
    </div>
  </form>

  <div id="loading">Loading...</div>
  <section id="open-section" style="display:none">
    <div class="section-label">Open</div>
    <div id="open-tasks"></div>
  </section>
  <section id="done-section" style="display:none">
    <div class="section-label">Completed</div>
    <div id="done-tasks"></div>
  </section>

  <div id="edit-overlay">
    <div id="edit-modal">
      <h2>Edit Task</h2>
      <div class="edit-field">
        <label class="edit-label" for="edit-title">Title</label>
        <input type="text" id="edit-title" />
      </div>
      <div class="edit-field">
        <label class="edit-label" for="edit-desc">Description</label>
        <textarea id="edit-desc" rows="3"></textarea>
      </div>
      <div class="edit-field">
        <label class="edit-label" for="edit-due">Due Date</label>
        <input type="date" id="edit-due" />
      </div>
      <div class="edit-actions">
        <button type="button" class="btn-secondary" id="edit-cancel">Cancel</button>
        <button type="button" class="btn-primary" id="edit-save">Save</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>

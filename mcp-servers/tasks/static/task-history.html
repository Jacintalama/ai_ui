<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task History — AIUI</title>
<style>
  body { margin: 0; background: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .stage { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
  .nav { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
  .nav a { color: #60a5fa; text-decoration: none; font-size: 13px; }
  .nav button { background: #1a1a1a; color: #fff; border: 1px solid #2a2a2a; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .nav button:hover { background: #2a2a2a; }
  .nav button:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav .page-info { color: #888; font-size: 13px; margin-left: auto; }
  table { width: 100%; border-collapse: collapse; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; }
  th { text-align: left; padding: 10px 14px; background: #111; color: #888; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2a2a; }
  td { padding: 12px 14px; border-bottom: 1px solid #1a1a1a; vertical-align: top; font-size: 13px; }
  tr:last-child td { border-bottom: 0; }
  tr:hover td { background: #131313; }
  .badge { font-size: 10.5px; padding: 3px 8px; border-radius: 4px; font-weight: 600; letter-spacing: 0.3px; display: inline-block; }
  .badge.BUILD { background: #7f1d1d; color: #fee2e2; }
  .badge.RESEARCH { background: #1e3a8a; color: #dbeafe; }
  .badge.INTEGRATE { background: #365314; color: #bef264; }
  .badge.ASK_USER { background: #7c2d12; color: #fed7aa; }
  .badge.ai { background: #1e3a8a; color: #dbeafe; }
  .badge.manual { background: #374151; color: #d1d5db; }
  .badge.completed { background: #065f46; color: #d1fae5; }
  .badge.failed { background: #7f1d1d; color: #fee2e2; }
  .empty { text-align: center; padding: 64px 16px; color: #666; }
  .result-cell { color: #aaa; font-size: 12px; max-width: 320px; }
  .meeting-cell { color: #777; font-size: 11.5px; font-family: monospace; }
</style>
</head>
<body>
<div class="stage">
  <h1>Task History</h1>
  <div class="subtitle">All tasks you've completed or that AI executed for you.</div>

  <div class="nav">
    <a href="/">← Back to AIUI</a>
    <button id="prev" disabled>← Prev</button>
    <button id="next" disabled>Next →</button>
    <span class="page-info" id="page-info"></span>
  </div>

  <div id="container">Loading…</div>
</div>

<script>
const PAGE_SIZE = 50;
let offset = 0;
let lastCount = 0;

async function load() {
  const container = document.getElementById("container");
  const info = document.getElementById("page-info");
  try {
    const r = await fetch(`/api/tasks/history?limit=${PAGE_SIZE}&offset=${offset}`, { credentials: "include" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const items = await r.json();
    lastCount = items.length;
    if (!items.length) {
      container.innerHTML = `<div class="empty">No tasks yet${offset > 0 ? " on this page" : ""}.</div>`;
    } else {
      container.innerHTML = renderTable(items);
    }
    info.textContent = `Showing ${offset + 1}–${offset + items.length}`;
    document.getElementById("prev").disabled = offset === 0;
    document.getElementById("next").disabled = items.length < PAGE_SIZE;
  } catch (e) {
    container.innerHTML = `<div class="empty">Failed to load: ${e.message}</div>`;
  }
}

function renderTable(items) {
  const rows = items.map(t => `
    <tr>
      <td>${t.completed_at ? new Date(t.completed_at).toLocaleString() : "—"}</td>
      <td><span class="badge ${escapeAttr(t.action_type)}">${escapeHtml(t.action_type)}</span></td>
      <td>${escapeHtml(t.description)}</td>
      <td><span class="badge ${escapeAttr(t.status)}">${escapeHtml(t.status)}</span></td>
      <td>${t.mode ? `<span class="badge ${escapeAttr(t.mode)}">${t.mode}</span>` : "—"}</td>
      <td class="result-cell">${escapeHtml((t.result || "").slice(0, 200))}${(t.result || "").length > 200 ? "…" : ""}</td>
      <td class="meeting-cell">${escapeHtml(String(t.meeting_id).slice(0, 8))}…</td>
    </tr>
  `).join("");
  return `
    <table>
      <thead><tr><th>Completed</th><th>Type</th><th>Description</th><th>Status</th><th>Mode</th><th>Result</th><th>Meeting</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function escapeHtml(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function escapeAttr(s) { return String(s == null ? "" : s).replace(/[^a-zA-Z0-9_-]/g, ""); }

document.getElementById("prev").addEventListener("click", () => { offset = Math.max(0, offset - PAGE_SIZE); load(); });
document.getElementById("next").addEventListener("click", () => { offset += PAGE_SIZE; load(); });
load();
</script>
</body>
</html>

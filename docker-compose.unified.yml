# =============================================================================
# MCP Proxy - Unified Deployment with API Gateway
# =============================================================================
#
# Complete stack with centralized authentication and rate limiting.
#
# Architecture:
#   Browser -> Caddy (port 80) -> API Gateway -> Backend Services
#
# Services:
#   - caddy: Reverse proxy and TLS termination
#   - api-gateway: JWT validation, rate limiting, user header injection
#   - mcp-proxy: MCP tool orchestration (API_GATEWAY_MODE=true)
#   - open-webui: AI chat interface
#   - admin-portal: User/group management UI
#   - postgres: Database
#   - redis: Sessions and cache
#   - MCP servers: Tool containers
#
# Usage:
#   docker compose -f docker-compose.unified.yml up -d
#
# =============================================================================

services:
  # ===========================================================================
  # CADDY - Reverse Proxy
  # ===========================================================================
  # Entry point for all traffic. Routes to API Gateway.
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api-gateway
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ===========================================================================
  # API GATEWAY - Centralized Auth & Rate Limiting
  # ===========================================================================
  # Validates JWTs, looks up user groups, applies rate limits, forwards headers.
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8085:8080"
    restart: unless-stopped
    environment:
      # JWT validation (same key as Open WebUI)
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # Database for group lookups and analytics
      - DATABASE_URL=postgresql://openwebui:${POSTGRES_PASSWORD}@postgres:5432/openwebui
      # Rate limiting
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=500
      - RATE_LIMIT_PER_IP=5000
      # Analytics logging
      - ENABLE_API_ANALYTICS=true
      # Backend service URLs
      - MCP_PROXY_URL=http://mcp-proxy:8000
      - ADMIN_PORTAL_URL=http://admin-portal:8080
      - OPEN_WEBUI_URL=http://open-webui:8080
      # Debug mode
      - DEBUG=${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/gateway/health"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ==========================================================================
  # Webhook Handler - External event processing
  # ==========================================================================
  webhook-handler:
    build: ./webhook-handler
    container_name: webhook-handler
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - DEBUG=${DEBUG:-false}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OPENWEBUI_URL=http://open-webui:8080
      - OPENWEBUI_API_KEY=${OPENWEBUI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4-turbo}
      - MCP_PROXY_URL=http://mcp-proxy:8000
      - MCP_USER_EMAIL=webhook-handler@system
      - MCP_USER_GROUPS=MCP-Admin
      - AUTOMATION_PIPE_MODEL=${AUTOMATION_PIPE_MODEL:-webhook_automation.webhook-automation}
      - N8N_URL=${N8N_API_URL:-http://n8n:5678}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://n8n:5678}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID:-}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_ALERT_CHANNEL_ID=${DISCORD_ALERT_CHANNEL_ID:-}
      - REPORT_GITHUB_REPO=${REPORT_GITHUB_REPO:-TheLukasHenry/proxy-server}
      - REPORT_SLACK_CHANNEL=${REPORT_SLACK_CHANNEL:-}
      - PR_REVIEWER_URL=${PR_REVIEWER_URL:-http://pr-reviewer:3000}
      - VOICE_WEBHOOK_SECRET=${VOICE_WEBHOOK_SECRET:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-JBFqnCBsd6RMkjVDRZzb}
      - ELEVENLABS_MODEL_ID=${ELEVENLABS_MODEL_ID:-eleven_turbo_v2_5}
      - ELEVENLABS_AGENT_ID=${ELEVENLABS_AGENT_ID:-}
    networks:
      - backend
    depends_on:
      - open-webui
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8086/health')"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ===========================================================================
  # CLAUDE ANALYZER - Claude Code Analysis (PR Review, BRE, Security, etc.)
  # ===========================================================================
  claude-analyzer:
    build: ./claude-analyzer
    container_name: claude-analyzer
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - analyzer-workspace:/workspace
    networks:
      backend:
        aliases:
          - pr-reviewer
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s


  # ==========================================================================
  # n8n - Workflow Automation
  # ==========================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://ai-ui.coolestdomain.win/n8n/}
      - N8N_RESTRICT_ENVIRONMENT_VARIABLES_ACCESS=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Secrets for n8n workflow nodes
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENWEBUI_API_KEY=${OPENWEBUI_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_ALERT_CHANNEL_ID=${DISCORD_ALERT_CHANNEL_ID:-}
      - OPENWEBUI_URL=http://open-webui:8080
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - backend


  # ===========================================================================
  # MCP PROXY - Multi-Tenant Tool Gateway
  # ===========================================================================
  # Tool orchestration with multi-tenant filtering.
  # API_GATEWAY_MODE=true: Trusts headers from API Gateway.
  mcp-proxy:
    build: ./mcp-proxy
    container_name: mcp-proxy
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-false}
      # =======================================================================
      # API GATEWAY MODE - Trust headers from gateway
      # =======================================================================
      - API_GATEWAY_MODE=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - TRUSTED_PROXY_HEADERS=X-User-Email,X-User-Groups,X-User-Admin
      # Database for permission lookups
      - DATABASE_URL=postgresql://openwebui:${POSTGRES_PASSWORD}@postgres:5432/openwebui
      # MCP Server URLs (Docker internal network)
      - MCP_FILESYSTEM_URL=http://mcp-filesystem:8001
      - MCP_GITHUB_URL=http://mcp-github:8000
      - MCP_CLICKUP_URL=http://mcp-clickup:8000
      - MCP_TRELLO_URL=http://mcp-trello:8000
      - MCP_SONARQUBE_URL=http://mcp-sonarqube:8000
      - MCP_EXCEL_URL=http://mcp-excel:8000
      - MCP_DASHBOARD_URL=http://mcp-dashboard:8000
      - MCP_NOTION_URL=http://mcp-notion:8000
      - MCP_N8N_URL=http://mcp-n8n:8000
      - MCP_SCHEDULER_URL=http://mcp-scheduler:8000
      # API Keys
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CLICKUP_API_TOKEN=${CLICKUP_API_TOKEN:-}
      - TRELLO_API_KEY=${TRELLO_API_KEY:-}
      - SONARQUBE_TOKEN=${SONARQUBE_TOKEN:-}
      - SONARQUBE_URL=${SONARQUBE_URL:-}
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - NOTION_API_KEY=${NOTION_API_KEY:-}
      - N8N_API_KEY=${N8N_API_KEY:-}
      # Meta-tools mode
      - META_TOOLS_MODE=${META_TOOLS_MODE:-false}
      # Skip cache refresh on startup (faster boot)
      - SKIP_CACHE_REFRESH=${SKIP_CACHE_REFRESH:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ===========================================================================
  # OPEN WEBUI - AI Chat Interface
  # ===========================================================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.3
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # LLM Connections
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-false}
      # OpenAI + Pipelines (semicolon-separated for multiple connections)
      - OPENAI_API_KEYS=${OPENAI_API_KEY:-};0p3n-w3bu!
      - OPENAI_API_BASE_URLS=${OPENAI_API_BASE_URL:-};http://pipelines:9099
      # Database
      - DATABASE_URL=postgresql://openwebui:${POSTGRES_PASSWORD}@postgres:5432/openwebui
      - VECTOR_DB=pgvector
      - PGVECTOR_CONNECTION_STRING=postgresql://openwebui:${POSTGRES_PASSWORD}@postgres:5432/openwebui
      # Redis
      - REDIS_URL=redis://redis:6379/0
      - ENABLE_REDIS=true
      # Microsoft OAuth
      - ENABLE_OAUTH_SIGNUP=true
      - DEFAULT_USER_ROLE=user
      - ENABLE_LOGIN_FORM=true
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_TENANT_ID=${MICROSOFT_TENANT_ID:-consumers}
      - MICROSOFT_REDIRECT_URI=${WEBUI_URL:-http://localhost}/oauth/microsoft/callback
      - OPENID_PROVIDER_URL=${OPENID_PROVIDER_URL:-}
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - WEBUI_URL=${WEBUI_URL:-http://localhost}
      # Group Management
      - ENABLE_OAUTH_GROUP_MANAGEMENT=true
      - ENABLE_OAUTH_GROUP_CREATION=true
      - OAUTH_GROUP_CLAIM=groups
      # Role Management
      - ENABLE_OAUTH_ROLE_MANAGEMENT=true
      - OAUTH_ADMIN_ROLES=MCP-Admin
      # Workspaces
      - ENABLE_WORKSPACE=true
      # User headers (forwarded by gateway)
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
      - BYPASS_MODEL_ACCESS_CONTROL=true
      # LangFuse Observability (in-process filter reads these)
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_BASE_URL:-}
      # =======================================================================
      # MCP Proxy Connection
      # =======================================================================
      # Use "session" auth_type so Open WebUI sends JWT to MCP Proxy
      # The gateway will validate it and forward user headers
      - 'TOOL_SERVER_CONNECTIONS=[{"type":"openapi","url":"http://mcp-proxy:8000","path":"/openapi.json","auth_type":"session","key":"mcp-proxy","config":{"enable":true},"info":{"id":"mcp-proxy","name":"MCP Proxy","description":"Single proxy for all MCP servers"}}]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend


  # ===========================================================================
  # ADMIN PORTAL - User/Group Management
  # ===========================================================================
  admin-portal:
    build: ./admin-portal
    container_name: admin-portal
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://openwebui:${POSTGRES_PASSWORD}@postgres:5432/openwebui
      - SECRET_KEY=${WEBUI_SECRET_KEY}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@example.com}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend


  # ===========================================================================
  # POSTGRESQL - Database
  # ===========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db-hetzner.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_USER=openwebui
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=openwebui
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwebui -d openwebui"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend


  # ===========================================================================
  # REDIS - Sessions & Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend


  # ===========================================================================
  # MCP SERVERS - Tool Containers
  # ===========================================================================

  # Filesystem - File access tools (14 tools)
  mcp-filesystem:
    image: node:20-slim
    container_name: mcp-filesystem
    restart: unless-stopped
    command: >
      bash -c "apt-get update && apt-get install -y python3 python3-pip curl --no-install-recommends &&
               pip3 install --break-system-packages mcpo &&
               mcpo --host 0.0.0.0 --port 8001 --api-key $${MCP_API_KEY} -- npx -y @modelcontextprotocol/server-filesystem /data"
    environment:
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key}
    volumes:
      - ./mcp-data:/data
    networks:
      - backend


  # GitHub - Repository tools (26 tools)
  mcp-github:
    build: ./mcp-servers/github
    container_name: mcp-github
    restart: unless-stopped
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN}
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key}
    networks:
      - backend


  # ClickUp - Task management (177+ tools)
  mcp-clickup:
    image: node:20-slim
    container_name: mcp-clickup
    restart: unless-stopped
    command: >
      bash -c "apt-get update && apt-get install -y python3 python3-pip curl --no-install-recommends &&
               pip3 install --break-system-packages mcpo &&
               mcpo --host 0.0.0.0 --port 8000 --api-key $${MCP_API_KEY} -- npx -y @chykalophia/clickup-mcp-server"
    environment:
      - CLICKUP_API_TOKEN=${CLICKUP_API_TOKEN}
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key}
    networks:
      - backend


  # Trello - Kanban boards
  mcp-trello:
    image: node:20-slim
    container_name: mcp-trello
    restart: unless-stopped
    command: >
      bash -c "apt-get update && apt-get install -y python3 python3-pip curl --no-install-recommends &&
               pip3 install --break-system-packages mcpo &&
               mcpo --host 0.0.0.0 --port 8000 --api-key $${MCP_API_KEY} -- npx -y mcp-server-trello"
    environment:
      - TRELLO_API_KEY=${TRELLO_API_KEY}
      - TRELLO_TOKEN=${TRELLO_API_TOKEN}
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key}
    networks:
      - backend


  # SonarQube - Code quality analysis
  mcp-sonarqube:
    image: node:20-slim
    container_name: mcp-sonarqube
    restart: unless-stopped
    command: >
      bash -c "apt-get update && apt-get install -y python3 python3-pip curl --no-install-recommends &&
               pip3 install --break-system-packages mcpo &&
               mcpo --host 0.0.0.0 --port 8000 --api-key $${MCP_API_KEY} -- npx -y @wallacewen/sonarqube-mcp-server"
    environment:
      - SONARQUBE_TOKEN=${SONARQUBE_TOKEN}
      - SONARQUBE_URL=${SONARQUBE_URL:-https://sonarcloud.io}
      - SONARQUBE_ORGANIZATION=${SONARQUBE_ORGANIZATION:-}
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key}
    networks:
      - backend


  # Excel Creator - Spreadsheet generation
  mcp-excel:
    build: ./mcp-servers/excel-creator
    container_name: mcp-excel
    restart: unless-stopped
    networks:
      - backend


  # Dashboard - Executive dashboard generation
  mcp-dashboard:
    build: ./mcp-servers/dashboard
    container_name: mcp-dashboard
    restart: unless-stopped
    networks:
      - backend


  # Notion - Workspace and documentation
  mcp-notion:
    build: ./mcp-servers/notion
    container_name: mcp-notion
    restart: unless-stopped
    environment:
      - OPENAPI_MCP_HEADERS={"Authorization":"Bearer ${NOTION_API_KEY}","Notion-Version":"2022-06-28"}
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key}
    networks:
      - backend


  # n8n MCP - AI-driven workflow creation and management (20 tools)
  # Official image: ghcr.io/czlonkowski/n8n-mcp (13.7k stars)
  mcp-n8n:
    build: ./mcp-servers/n8n
    container_name: mcp-n8n
    restart: unless-stopped
    environment:
      - MCP_MODE=stdio
      - N8N_API_URL=${N8N_API_URL:-http://n8n:5678}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key}
      - LOG_LEVEL=error
      - DISABLE_CONSOLE_OUTPUT=true
      - N8N_MCP_TELEMETRY_DISABLED=true
      - NODE_ENV=production
      - REBUILD_ON_START=false
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - n8n-mcp-data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - backend


  # Scheduler MCP - Cron job management from chat (4 tools)
  mcp-scheduler:
    build: ./mcp-servers/scheduler
    container_name: mcp-scheduler
    restart: unless-stopped
    environment:
      - WEBHOOK_HANDLER_URL=http://webhook-handler:8086
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key}
    networks:
      - backend
    depends_on:
      - webhook-handler
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M


  # ===========================================================================
  # DATABASE INIT - Seed data from mcp-servers.json
  # ===========================================================================
  db-init:
    build: ./mcp-proxy
    container_name: db-init
    command: ["python", "/app/scripts/seed_mcp_servers.py", "--clear"]
    environment:
      - DATABASE_URL=postgresql://openwebui:${POSTGRES_PASSWORD}@postgres:5432/openwebui
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - backend

  # ===========================================================================
  # PIPELINES - External Pipe/Filter Runner
  # ===========================================================================
  # Runs Pipe Functions and Filters outside the Open WebUI process.
  # Exposes OpenAI-compatible API on port 9099.
  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    restart: unless-stopped
    volumes:
      - pipelines-data:/app/pipelines
    environment:
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_HOST=${LANGFUSE_BASE_URL}
    networks:
      - backend


  # ===========================================================================
  # LOKI - Log Aggregation
  # ===========================================================================
  # Stores and indexes logs received from Promtail.
  loki:
    image: grafana/loki:3.4
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--output-document=-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # PROMTAIL - Log Shipper
  # ===========================================================================
  # Reads Docker container logs from /var/lib/docker/containers and ships to Loki.
  # Auto-discovers all containers and labels logs by container name.
  promtail:
    image: grafana/promtail:3.4
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    depends_on:
      - loki
    networks:
      - backend

  # ===========================================================================
  # GRAFANA - Log Dashboard + Alerts
  # ===========================================================================
  # Web UI for searching logs, viewing dashboards, and configuring alerts.
  # Access via /grafana/ route in Caddy.
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--output-document=-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  redis-data:
  open-webui-data:
